[project]
name = "ccrg-iter9-absorption-coverage-screen"
version = "0.1.0"
description = "M3'''' Absorption-Coverage Screen + shipped label-free practitioner screen (screen.py). Reuses the $0 recall-hole + firing-disjoint absorber + precision + hole-coverage-gain bootstrap-CI signature over 10 concept hierarchies (spelling / taxonomic country / 4 homograph-entity / 4 safety-identity) to produce a Wilson+bootstrap-CI coverage table of feature absorption on a frozen Gemma-Scope L12/16k JumpReLU SAE + gemma-2-2b. Single GPU; $0 model-internal."
requires-python = ">=3.12"
# NOTE: torch/triton/nvidia-* are the CUDA 12.8 (Blackwell sm_120) builds — install torch from the
# PyTorch cu128 index: `uv pip install torch --index-url https://download.pytorch.org/whl/cu128`.
# Exact versions below are `uv pip freeze` from the venv that produced method_out.json (RTX 5090 / CUDA 12.8).
