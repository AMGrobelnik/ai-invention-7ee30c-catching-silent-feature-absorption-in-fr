    "h11==0.16.0",
    "httpcore==1.0.9",
    "httpx==0.28.1",
    "idna==3.18",
    "joblib==1.5.3",
    "markdown-it-py==4.2.0",
    "mdurl==0.1.2",
    "narwhals==2.22.1",
    "packaging==26.2",
